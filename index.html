<title>Yu Pan — UZH</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    /* — Sky palette: icy paper, deep slate ink, single sky-blue accent — */
    --paper:  #F7FAFC;
    --card:   #EEF3F7;
    --ink:    #0F1820;
    --muted:  #6C7884;
    --rule:   rgba(15,24,32,0.10);
    --accent: #3D7EC9;
    --accent-deep: #2A5F9E;
    --uzh:    #0028A5;   /* Official Universität Zürich blue — used only on the UZH wordmark */

    /* — Type — */
    --serif:  "Newsreader", "Iowan Old Style", Georgia, serif;
    --sans:   "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  /* Reserve dark mode for later — switch the media value to "dark" to opt in */
  @media (prefers-color-scheme: dark-disabled) {
    :root {
      --paper:  #0E1620;
      --card:   #14202E;
      --ink:    #EAF2F8;
      --muted:  #8B98A6;
      --rule:   rgba(234,242,248,0.12);
      --accent: #6CA8DE;
      --accent-deep: #98C4EE;
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper); color: var(--ink);
    font-family: var(--serif); font-size: 17px; line-height: 1.7;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern", "liga", "calt", "onum";
  }
  /* Tabular figures everywhere a number means "compare me to other numbers" */
  .pub-left, .pub-status, .teach-card .term,
  header.site .dept, footer.site,
  .news .kicker, .title-block .est {
    font-feature-settings: "kern", "liga", "tnum", "cv11";
    font-variant-numeric: tabular-nums;
  }
  img { max-width: 100%; height: auto; }
  a { color: inherit; text-decoration: none; }
  a.link {
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: color 160ms ease, border-color 160ms ease;
  }
  a.link:hover { color: var(--accent-deep); border-bottom-color: var(--accent-deep); }
  ::selection { background: rgba(61,126,201,0.20); }
  .sans { font-family: var(--sans); }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 48px; }

  /* — Header — */
  header.site {
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }
  header.site .row {
    display: flex; justify-content: space-between; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  header.site .brand {
    display: flex; align-items: center; gap: 16px;
  }
  .uzh-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; flex-shrink: 0;
    transition: opacity 160ms ease;
  }
  .uzh-mark img { width: 100%; height: 100%; display: block; }
  .uzh-mark:hover { opacity: 0.65; }
  header.site .lockup {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
    line-height: 1.5;
  }
  header.site .lockup .l1 { color: var(--ink); font-weight: 600; }
  header.site .dept {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); font-weight: 500;
  }
  header.site nav {
    display: flex; gap: 28px;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
  }
  header.site nav a {
    color: var(--muted);
    transition: color 160ms ease;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
  }
  header.site nav a.active { color: var(--ink); border-bottom-color: var(--ink); }
  header.site nav a:hover { color: var(--ink); }

  /* — Title block — */
  .title-block { text-align: center; padding: 128px 0 80px; }
  .title-block .kicker {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--accent); font-weight: 600;
    margin-bottom: 40px;
  }
  .title-block h1 {
    font-size: 112px; font-weight: 400; margin: 0;
    letter-spacing: -0.025em; line-height: 0.96;
    font-variation-settings: "opsz" 72;
    text-wrap: balance;
  }
  .title-block .tagline {
    font-size: 24px; font-style: italic; font-weight: 400;
    color: var(--ink); max-width: 720px; margin: 32px auto 0;
    line-height: 1.4;
    font-variation-settings: "opsz" 24;
    letter-spacing: 0.005em;
    text-wrap: pretty;
    font-feature-settings: "kern", "liga", "calt", "onum";
  }
  .title-block .est {
    margin-top: 48px; display: inline-flex; align-items: center; gap: 16px;
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500;
  }
  .title-block .est .dash { width: 40px; height: 1px; background: var(--muted); opacity: 0.6; }

  /* — Intro + portrait — */
  .intro {
    padding: 72px 0; display: grid; grid-template-columns: 240px 1fr; gap: 64px;
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
  }
  .portrait {
    width: 240px; height: 240px;
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 1px 0 var(--rule);
  }
  .portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .intro .addr {
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    margin-top: 18px; line-height: 1.8; text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 500;
  }
  .intro .body .section-label {
    font-family: var(--sans); font-size: 11px; color: var(--accent);
    letter-spacing: 0.28em; text-transform: uppercase; font-weight: 600;
    margin-bottom: 24px;
  }
  .intro .body p {
    font-size: 20px; line-height: 1.6; margin: 0 0 20px;
    text-wrap: pretty;
  }
  .intro .body p:last-of-type { margin-bottom: 0; color: var(--muted); font-size: 17px; }
  .intro .links {
    margin-top: 32px; display: flex; gap: 24px; flex-wrap: wrap;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
  }

  /* — News / Upcoming — */
  .news {
    padding: 88px 0; text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  .news .kicker {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--accent); font-weight: 600;
    margin-bottom: 24px;
  }
  .news .lead {
    font-size: 30px; font-style: italic; font-weight: 400;
    line-height: 1.32; max-width: 820px; margin: 0 auto 18px;
    letter-spacing: -0.005em;
    font-variation-settings: "opsz" 28;
    text-wrap: balance;
  }
  .news .meta { font-size: 15px; color: var(--muted); margin-top: 4px; }
  .news .venue { font-size: 15px; font-style: italic; margin-top: 6px; }
  .news .cta {
    margin-top: 28px;
    font-family: var(--sans); font-size: 11px;
    color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 600;
  }
  .news.upcoming { padding: 72px 0; }
  .news.upcoming .lead { font-size: 26px; }

  /* — Section title block (Research / Teaching headers) — */
  .section-title { text-align: center; margin: 0 0 48px; }
  .section-title .tag {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--accent); font-weight: 600;
    margin-bottom: 12px;
  }
  .section-title h2 {
    font-size: 44px; font-weight: 400; letter-spacing: -0.022em;
    margin: 0;
    font-variation-settings: "opsz" 44;
  }
  .section-title .sub {
    font-size: 15px; font-style: italic; color: var(--muted); margin-top: 8px;
  }

  /* — Footer — */
  footer.site {
    padding: 36px 0; border-top: 1px solid var(--rule);
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    letter-spacing: 0.16em; text-transform: uppercase; font-weight: 500;
  }
  footer.site .row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

  /* — Research chapter style (kept, sky-toned) — */
  .chapter {
    padding: 88px 0 72px;
    border-bottom: 1px solid var(--rule);
  }
  .chapter:last-of-type { border-bottom: none; }
  .chapter-head {
    display: grid; grid-template-columns: 140px 1fr; gap: 40px;
    align-items: flex-start; margin-bottom: 44px;
  }
  .chapter-num-label {
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    letter-spacing: 0.24em; text-transform: uppercase; margin-bottom: 10px;
    font-weight: 500;
  }
  .chapter-num {
    font-size: 108px; font-weight: 400; letter-spacing: -0.03em;
    line-height: 0.9; color: var(--accent);
    font-variation-settings: "opsz" 72;
  }
  .chapter-meta {
    font-family: var(--sans); font-size: 11px; color: var(--accent);
    letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600;
    margin-bottom: 14px;
  }
  .chapter-title {
    font-size: 40px; font-weight: 400; letter-spacing: -0.022em;
    line-height: 1.14; margin: 0 0 8px;
    text-wrap: balance;
  }

  /* — Group heading (used on Research / Teaching subsections) — */
  .group-heading { text-align: center; padding: 72px 0 8px; position: relative; }
  .group-heading .roman {
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.34em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    font-weight: 500;
  }
  .group-heading h3 {
    font-size: 32px; font-weight: 400; letter-spacing: -0.018em;
    margin: 0 0 4px; font-style: italic;
    font-variation-settings: "opsz" 28;
  }
  .group-heading .count { font-size: 13px; color: var(--muted); font-style: italic; }
  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin: 24px 0 0;
  }
  .ornament .line { width: 60px; height: 1px; background: var(--rule); }
  .ornament .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }

  /* — Teaching grid — */
  .teaching-grid {
    max-width: 900px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 36px 48px;
  }
  .teach-card .term {
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500;
    margin-bottom: 8px;
  }
  .teach-card .ttitle {
    font-size: 22px; font-weight: 400; letter-spacing: -0.015em;
    margin-bottom: 4px; line-height: 1.3;
  }
  .teach-card .role { font-size: 15px; font-style: italic; color: var(--muted); line-height: 1.5; }

  /* — Publication list (book-style) — */
  .pub-list { max-width: 880px; margin: 0 auto; padding: 32px 0 0; }
  .pub {
    display: grid; grid-template-columns: 140px 1fr 80px; gap: 32px;
    padding: 26px 0; border-bottom: 1px solid var(--rule);
    align-items: baseline;
  }
  .pub:last-child { border-bottom: none; }
  .pub-left {
    font-family: var(--sans); font-size: 11px; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500;
    line-height: 1.7; text-align: center; align-self: center;
  }
  .pub-status {
    font-family: var(--sans); font-size: 10px; color: var(--muted);
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500;
    white-space: nowrap;
  }
  .pub-title {
    font-size: 20px; font-weight: 400; letter-spacing: -0.015em;
    line-height: 1.36; margin-bottom: 8px;
    text-wrap: pretty;
  }
  .pub-authors {
    font-size: 14.5px; color: var(--ink); line-height: 1.6; margin-bottom: 4px;
    font-family: var(--sans);
  }
  .pub-authors b { font-weight: 600; color: var(--ink); }
  .pub-venue {
    font-size: 14px; color: var(--accent); line-height: 1.55;
    font-style: italic;
    font-family: var(--serif);
  }
  a.coauthor {
    color: var(--ink);
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color 160ms ease, border-color 160ms ease;
  }
  a.coauthor:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .pub-right {
    text-align: center; align-self: center;
    font-family: var(--sans); font-size: 12px;
  }

  /* — Backlink — */
  .backlink {
    display: inline-flex; gap: 8px; align-items: center;
    font-family: var(--sans); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-top: 12px;
    font-weight: 500;
  }
  .backlink:hover { color: var(--accent); }

  /* ─────────── Responsive ─────────── */
  @media (max-width: 820px) {
    html, body { font-size: 16px; }
    .wrap { padding: 0 20px; }

    header.site { padding: 14px 0; }
    header.site .row { gap: 12px; }
    header.site nav { gap: 18px; font-size: 12px; flex-wrap: wrap; }
    header.site .brand { gap: 14px; }
    .uzh-mark { width: 40px; height: 40px; }
    header.site .lockup { font-size: 10px; letter-spacing: 0.14em; line-height: 1.4; }

    .title-block { padding: 64px 0 48px; }
    .title-block .kicker { font-size: 10px; margin-bottom: 24px; letter-spacing: 0.24em; }
    .title-block h1 { font-size: 60px; letter-spacing: -0.018em; }
    .title-block .tagline { font-size: 19px; margin-top: 22px; padding: 0 8px; }
    .title-block .est { margin-top: 32px; font-size: 11px; gap: 10px; }
    .title-block .est .dash { width: 24px; }

    .intro { grid-template-columns: 1fr; gap: 32px; padding: 44px 0; }
    .portrait { width: 200px; height: 200px; margin: 0 auto; }
    .intro .addr { text-align: center; }
    .intro .body .section-label { font-size: 11px; margin-bottom: 16px; }
    .intro .body p { font-size: 18px; line-height: 1.6; }
    .intro .body p:last-of-type { font-size: 16px; }
    .intro .links { gap: 16px; font-size: 13px; justify-content: center; }

    .news { padding: 52px 0; }
    .news .lead { font-size: 22px; line-height: 1.36; padding: 0 4px; }
    .news.upcoming { padding: 40px 0; }
    .news.upcoming .lead { font-size: 19px; }

    .chapter-num { font-size: 64px !important; }
    .chapter-title { font-size: 26px !important; line-height: 1.25 !important; padding: 0 4px; }
    .chapter-body { font-size: 15px !important; line-height: 1.65 !important; padding: 0 4px; }

    .teaching-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    .pub { grid-template-columns: 1fr; gap: 6px; padding: 22px 0; }
    .pub-left { text-align: left; }
    h2 { font-size: 32px !important; }
    h3 { font-size: 22px !important; }
    section { padding: 48px 0 !important; }
    .group-heading { padding: 48px 0 4px; }
  }

  @media (max-width: 480px) {
    .title-block h1 { font-size: 48px; }
    .title-block .tagline { font-size: 17px; }
    .portrait { width: 160px; height: 160px; }
    .news .lead { font-size: 20px; }
    .chapter-num { font-size: 48px !important; }
    .chapter-title { font-size: 22px !important; }
  }
</style>
</head>

    'Gwen-Jirō Clochard': 'https://sites.google.com/view/gwen-jiro-clochard/home',
    'Helmut M. Dietl': 'https://www.business.uzh.ch/de/research/professorships/som/Team/helmutdietl.html',
    'Marco Henriques Pereira': 'https://www.business.uzh.ch/de/research/professorships/som/Team/Marco-Henriques-Pereira.html',
    'Luca Bagnato': 'https://lucabagnato.github.io/',
    'Miriam Venturini': 'https://miriamventurini.github.io/',
    'Jingwen Yu': 'https://ibs.bfsu.edu.cn/en/info/3202/1831.htm',
    'Yoshio Kamijo': 'https://sites.google.com/site/yoshiokamijo/',
    'Shohei Yamamoto': 'https://shohei-yamamoto.com/',
    'Laurel Walzak': 'https://www.torontomu.ca/rta/about/rta-faculty/laurel-walzak/',
    'Johannes Luger': 'https://www.business.uzh.ch/en/research/professorships/evidence-based-strategic-management/team/Chairholder/professor.html',
  };

  const linkAuthors = (authorsStr) => authorsStr.split(',').map(raw => {
    const name = raw.trim();
    if (name === 'Yu Pan') return `<b>${name}</b>`;
    const url = COAUTHOR_URLS[name];
    if (url) return `<a class="coauthor" href="${url}" target="_blank" rel="noopener">${name}</a>`;
    return name;
  }).join(', ');

  const pubRow = (p) => `
    <div class="pub">
      <div class="pub-left">${p.year || ''}</div>
      <div class="pub-body">
        <div class="pub-title">${p.title}</div>
        <div class="pub-authors">${linkAuthors(p.authors)}</div>
        ${p.venue ? `<div class="pub-venue">${p.venue}</div>` : ''}
        ${p.note ? `<div class="pub-venue">${p.note}</div>` : ''}
      </div>
      <div class="pub-right">${p.link ? `<a class="link" href="${p.link}" target="_blank" rel="noopener">Link</a>` : ''}</div>
    </div>
  `;

  const wpRow = (p) => `
    <div class="pub">
      <div class="pub-left"><span class="pub-status">${p.status}</span></div>
      <div class="pub-body">
        <div class="pub-title">${p.title}</div>
        <div class="pub-authors">${linkAuthors(p.authors)}</div>
        ${p.note ? `<div class="pub-venue">${p.note}</div>` : ''}
      </div>
      <div class="pub-right"></div>
    </div>
  `;

  return `
    <div class="wrap">
      <section class="title-block">
        <h1>Research</h1>
      </section>

      <div class="group-heading">
        <h3>Publications</h3>
        <div class="ornament"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
      </div>
      <section class="pub-list">
        ${publications.map(pubRow).join('')}
      </section>

      <div class="group-heading" style="padding-top:64px">
        <h3>Working Papers</h3>
        <div class="ornament"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
      </div>
      <section class="pub-list">
        ${workingPapers.map(wpRow).join('')}
      </section>

      <div class="group-heading" style="padding-top:64px">
        <h3>Selected Work in Progress</h3>
        <div class="ornament"><div class="line"></div><div class="dot"></div><div class="line"></div></div>
      </div>
      <section class="pub-list" style="padding-bottom:96px">
        ${inProgress.map(p => wpRow({ status: 'In Progress', ...p })).join('')}
      </section>
    </div>
  `;
}

// ─────────── Router (unchanged from original) ───────────
function go(page) {
  const app = document.getElementById('app');
  const render = PAGES[page] || PAGES.home;

  app.style.transition = 'opacity 200ms ease, transform 200ms ease';
  app.style.opacity = '0';
  app.style.transform = 'translateY(4px)';

  setTimeout(() => {
    app.innerHTML = render();

    document.querySelectorAll('header nav a').forEach(a => {
      a.classList.toggle('active', a.dataset.nav === page);
    });

    history.replaceState(null, '', page === 'home' ? '#' : '#' + page);
    window.scrollTo(0, 0);
    wireNav();

    requestAnimationFrame(() => {
      app.style.opacity = '1';
      app.style.transform = 'translateY(0)';
    });
  }, 200);
}

function wireNav() {
  document.querySelectorAll('a[data-nav]').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      go(a.dataset.nav);
    };
  });
}

const initial = (location.hash || '').replace('#', '') || 'home';
go(PAGES[initial] ? initial : 'home');
