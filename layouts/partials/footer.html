<footer class="bg-secondary-bg">
  <!-- Image at full width, no padding -->
  <div class="w-full">
    <img src="/images/home_page.jpg" alt="Footer image" class="w-full h-auto block">
  </div>
  
  <!-- Copyright text with padding -->
  <div class="flex justify-center py-8">
    {{ with .Site.Copyright }}
    <div class="text-sm text-gray-500">
      {{ . | safeHTML }}
    </div>
    {{ end }}
  </div>
</footer>
