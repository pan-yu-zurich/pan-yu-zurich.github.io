<div class="news-item mb-4 rounded-lg p-6 shadow-md" style="border-left: 4px solid var(--color-eureka); background: var(--color-secondary-bg);">
    <div class="flex flex-wrap items-baseline">
        <span class="text-lg font-medium mr-1">{{ .Get "time" }}</span>
        <span class="text-lg font-bold"> - {{ .Get "title" }}</span>
    </div>

    <div class="mt-2 [&_a]:text-inherit [&_a]:no-underline [&_a:hover]:underline">
        {{ .Get "content" | safeHTML }}
    </div>
</div>
